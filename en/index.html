":\"Approach\",\"caseStudies\":\"References\",\"contact\":\"Contact\",\"products\":\"Products\",\"aiStation\":\"AI Station\"}}],[\"$\",\"main\",null,{\"children\":[[\"$\",\"$L11\",null,{\"locale\":\"en\",\"translations\":{\"tagline\":\"Architect-as-a-Service\",\"title\":\"AI \u0026 Software projects that work.\",\"subtitle\":\"From architecture to finished product.\",\"description\":\"As your central point of contact, I guide your project from the first idea to successful launch – strategically, technically, and with clear communication.\",\"cta\":\"Schedule a Call\",\"secondaryCta\":\"Discover Services\"}}],[\"$\",\"$L12\",null,{\"translations\":{\"sectionTitle\":\"Sound Familiar?\",\"sectionSubtitle\":\"Challenges that cause IT projects to fail\",\"items\":[{\"title\":\"Bad Planning\",\"description\":\"Budgets blown, deadlines missed, and in the end, the result does not meet the expected quality.\",\"icon\":\"Timer\"},{\"title\":\"Uncertainty\",\"description\":\"Business speaks a different language than tech. Requirements are misunderstood, decisions delayed, and frustration grows on both sides.\",\"icon\":\"MessageSquareOff\"},{\"title\":\"High Costs\",\"description\":\"Technical complexity spirals out of control, costs for development and operations exceed expectations.\",\"icon\":\"TrendingUp\"}]}}],[\"$\",\"$L13\",null,{\"translations\":{\"sectionTitle\":\"Services\",\"sectionSubtitle\":\"Tailored solutions for every phase of your AI \u0026 software project\",\"items\":[{\"title\":\"Consulting\",\"description\":\"15+ years of experience help in making the right technical decisions to use your software profitably.\",\"icon\":\"Compass\",\"features\":[\"Reduce ongoing costs (Operations \u0026 Maintenance)\",\"Increase value creation with AI\",\"Increase productivity with automation\"]},{\"title\":\"Development\",\"description\":\"Clean, scalable software development, from the first line of code to the finished product with a focus on your business value.\",\"icon\":\"Code\",\"features\":[\"Custom Software Development\",\"Modernization of existing software\",\"GDPR-compliant use of AI\"]},{\"title\":\"Training\",\"description\":\"Training tailored to your company enables development teams to work more cost-effectively, faster, and with higher quality.\",\"icon\":\"GraduationCap\",\"features\":[\"Reduce development cost by 30% through AI\",\"No operating costs with ZeroOps architecture\",\"3x higher team productivity through automation\"]}]}}],[\"$\",\"$L14\",null,{\"translations\":{\"sectionTitle\":\"The Generalist Approach\",\"tagline\":\"Digital Generalist\",\"title\":\"A Bridge Between Business and Technology\",\"description\":\"In a world full of specialists, I'm the connecting factor. As a Digital Generalist, I understand both sides – business requirements and technical possibilities. This enables me to act as your central point of contact and ensure everyone is pulling in the same direction.\",\"benefits\":[{\"title\":\"Single Point of Contact\",\"description\":\"No endless coordination rounds between different teams and service providers.\"},{\"title\":\"Holistic View\",\"description\":\"I see the big picture without losing sight of the business value.\"},{\"title\":\"Clear Communication\",\"description\":\"I translate between business language and tech jargon – in both directions.\"}]}}],\"$L15\",\"$L16\"]}],\"$L17\"]\n"])</script><script>self.__next_f.push([1,"18:I[60553,[\"/_next/static/chunks/51680696653dd6b8.js\",\"/_next/static/chunks/744355e03808d4c7.js\",\"/_next/static/chunks/eefd0c7124dca837.js\",\"/_next/static/chunks/bf9835bd33c352ef.js\"],\"default\"]\n19:I[75854,[\"/_next/static/chunks/51680696653dd6b8.js\",\"/_next/static/chunks/744355e03808d4c7.js\",\"/_next/static/chunks/eefd0c7124dca837.js\",\"/_next/static/chunks/bf9835bd33c352ef.js\"],\"default\"]\n1a:I[13642,[\"/_next/static/chunks/51680696653dd6b8.js\",\"/_next/static/chunks/744355e03808d4c7.js\",\"/_next/static/chunks/eefd0c7124dca837.js\",\"/_next/static/chunks/bf9835bd33c352ef.js\"],\"default\"]\n"])</script><script>self.__next_f.push([1,"15:[\"$\",\"$L18\",null,{\"locale\":\"en\",\"translations\":{\"sectionTitle\":\"Success Stories\",\"sectionSubtitle\":\"Projects that made a difference\",\"items\":[{\"slug\":\"cloud-cost-optimization\",\"title\":\"Cloud costs permanently reduced\",\"category\":\"Consulting \u0026 Training\",\"description\":\"How just 10 lines of source code can save €25k/year and further measures for optimizing cloud and software architecture.\",\"results\":[\"-€150k cloud costs / year\",\"Google Cloud Platform\",\"Microsoft Azure\"],\"logos\":[\"/google_cloud_platform_logo.png\",\"/microsoft_azure_logo.png\"],\"content\":{\"title\":\"Cloud costs permanently reduced\",\"intro\":\"High cloud costs are often the result of poor architecture decisions at the beginning of a software project. Infrastructure costs grow faster than generated revenue, thereby destroying the business model. Here are three concrete examples of massive savings.\",\"sections\":[{\"title\":\"GCP: Save €25k/year or 55% with 10 lines of code\",\"text\":\"In a Google Cloud project, inefficient programming logic forgot to cache failed database queries, allowing millions of read accesses to always pass through to the database and causing immense costs. Only 10 lines of code for temporary storage (= caching) helped solve this problem and reduced database costs by 55% per month or €25k per year.\",\"image\":\"/case_studies/gcp_datastore_optimization.png\"},{\"title\":\"GCP: Save €75k/year with Serverless Architecture\",\"text\":\"A customer software used classic cloud instances (virtual machines) to run its application. These ran 24/7 and were designed for peak loads. By switching to serverless approaches, costs adapt to the actual network traffic of your application – meaning low traffic = lower costs! By automatically scaling to zero during inactivity, even more costs can be saved. Through the points listed below, it was possible to save an additional €75k per year in a customer project.\",\"points\":[\"Pay-per-request instead of flat-rate rental with Google Cloud Run\",\"Shutdown of test environments through simple automation\",\"Use of spot instances for batch jobs with Dataflow\"]},{\"title\":\"Microsoft Azure: Save €4k/month with correct log data settings\",\"text\":\"Frequently, the costs for monitoring and the associated collection of log data are underestimated. Too often, all log data from an application is simply collected indiscriminately and stored in a so-called Log Analytics Workspace from Azure. Here, the configuration was not adapted to the actual needs of the business. A 3-minute reconfiguration of the existing Azure cloud resources resulted in savings of approximately €4k per month.\",\"image\":\"/case_studies/azure_log_analytics_optimization.png\"}]}},{\"slug\":\"zero-ops\",\"title\":\"SaaS Model as Revenue Multiplier\",\"category\":\"Consulting \u0026 Development\",\"description\":\"Modernization of a 10-year-old application enabled serving 10x more customers with the same team size.\",\"results\":[\"10x more customers\",\"Maintenance-free infrastructure\",\"3x higher team velocity\"],\"logos\":[\"/google_cloud_platform_logo.png\"],\"content\":{\"title\":\"SaaS model as revenue multiplier\",\"intro\":\"Intelligent architecture allows any software to scale arbitrarily and fully automatically, incurring costs only when your customers actually use it. The Software-as-a-Service (SaaS) model enables serving 10x more customers with the same team size. Furthermore, an operations team was intentionally omitted, creating a sustainable and maintenance-free ZeroOps infrastructure using a cloud-first strategy.\",\"sections\":[{\"title\":\"The Challenge\",\"text\":\"A customer's software (C# + SQL Server) was operated for 10 years without major modernization. The existing development team reached its capacity limits, and it was not possible to add more customers without losing quality and reliability. Maintenance and care proved to be a challenge and caused high costs. The business model could no longer grow, and the company was at the end of its growth.\"},{\"title\":\"Solution: SaaS Model with Google Cloud Platform\",\"text\":\"The SaaS model describes the characteristic of serving many customers simultaneously with a shared infrastructure and software. For this purpose, the Google Cloud Platform (GCP) was chosen, as it particularly supports the serverless approach. Through the clever selection of managed services (Cloud Run, BigQuery, Dataflow), operational tasks could be skillfully outsourced to GCP, and the development team focused on new development.\",\"points\":[\"Automated scaling to zero during inactivity\",\"Managed Security \u0026 Managed Services (Cloud Run, BigQuery, Dataflow)\",\"Infrastructure-as-Code (IaC) with Terraform for customer environments\"]},{\"title\":\"ZeroOps: Operating Costs = 0\",\"text\":\"A good infrastructure repairs itself (self-healing) and scales automatically with actual usage (also Cloud-Native Architecture). The team focuses 100% on features instead of servers.\",\"image\":\"/case_studies/gcp_zeroops.png\"}]}}]}}]\n"])</script><script>self.__next_f.push([1,"16:[\"$\",\"$L19\",null,{\"translations\":{\"sectionTitle\":\"Contact\",\"sectionSubtitle\":\"Ready to put your next project on solid ground? Schedule a no-obligation introductory call.\",\"description\":\"Schedule a no-obligation introductory call and we'll discuss how I can support you.\",\"bookingTitle\":\"Book a Meeting\",\"bookingLink\":\"https://calendar.app.google/WXjafe2L6EMspivw6\",\"or\":\"or\",\"directContact\":\"Direct Contact\",\"email\":\"contact@liebhart-consulting.at\"}}]\n17:[\"$\",\"$L1a\",null,{\"locale\":\"en\",\"translations\":{\"tagline\":\"AI \u0026 Software projects that work. From architecture to finished product.\",\"navigation\":\"Navigation\",\"legal\":\"Legal\",\"legalLinks\":{\"imprint\":\"Imprint\",\"privacy\":\"
