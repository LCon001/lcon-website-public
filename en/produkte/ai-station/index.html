ating Word documents, Excel files, CSV, and PDF.\",\"icon\":\"FileSpreadsheet\"},{\"title\":\"Integrability\",\"description\":\"Your own data, additional interfaces (ERP, CRM, REST API, SQL, …), or build new AI apps—easily yourself with AI-assisted chat or via our expert service.\",\"icon\":\"Puzzle\"},{\"title\":\"Secure Backup\",\"description\":\"Fully encrypted backup with us in Austria—accessible only to you, so data is not lost if hardware fails.\",\"icon\":\"HardDrive\"}]},\"packages\":{\"sectionTitle\":\"Packages\",\"sectionSubtitle\":\"The right hardware for your organization\",\"hardwareLabel\":\"Hardware\",\"licensesLabel\":\"Choose your license\",\"recommendedLabel\":\"Recommended\",\"priceVatNote\":\"All prices plus VAT.\",\"contactSales\":{\"label\":\"On request\",\"cta\":\"Contact Sales\",\"email\":\"contact@liebhart-consulting.at\"},\"pro\":{\"name\":\"AI Station – Pro\",\"platform\":\"The affordable AI workstation.\",\"hardwarePrice\":\"€6,500 one-time\",\"image\":\"/products/ai-station-product-pro.png\",\"imagePlaceholder\":\"Hardware image coming soon\",\"features\":[{\"type\":\"item\",\"text\":\"Plug-and-play\"},{\"type\":\"item\",\"text\":\"Low power consumption\"},{\"type\":\"group\",\"title\":\"Software features\",\"items\":[\"Interactive chat\",\"Unlimited AI apps\",\"Integration with Microsoft Office 365 / Google Workspace\",\"Optimized for Word templates, Excel spreadsheets, CSV files, PDF documents, and images.\",\"Create diagrams as PNG / SVG\",\"Unlimited custom interfaces\",\"Role-based access control\"]}],\"licenseTiers\":[{\"name\":\"Basic License\",\"price\":\"€3,000\",\"priceSuffix\":\"year\",\"recommended\":true,\"badge\":\"Most popular\",\"features\":[\"Security \u0026 software updates\",\"Weekly backup (up to 100 GB)\",\"Passive monitoring\",\"Email support (business days)\"]},{\"name\":\"Premium License\",\"price\":\"€6,000\",\"priceSuffix\":\"year\",\"features\":[\"Updates incl. AI model upgrades\",\"Daily backup (up to 500 GB)\",\"Proactive monitoring\",\"Phone support + express replacement for hardware problems (loaner unit)\"]}],\"suitableFor\":{\"prefix\":\"Suitable for up to \",\"highlight\":\"5 concurrent\",\"suffix\":\" user requests or running apps\"}},\"max\":{\"name\":\"AI Station – Max\",\"badge\":\"Coming soon\",\"platform\":\"The NVIDIA powerhouse.\",\"hardwareContactSales\":true,\"emailSubject\":\"AI Station - Max: Customer inquiry\",\"image\":\"/products/ai-station-product-max.png\",\"imagePlaceholder\":\"Hardware image coming soon\",\"features\":[{\"type\":\"item\",\"text\":\"Pre-configured servers\"},{\"type\":\"item\",\"text\":\"Employee training included\"},{\"type\":\"group\",\"title\":\"Software features\",\"items\":[\"Interactive chat\",\"Unlimited AI apps\",\"Integration with Microsoft Office 365 / Google Workspace\",\"Optimized for Word templates, Excel spreadsheets, CSV files, PDF documents, and images.\",\"Create diagrams as PNG / SVG\",\"Unlimited custom interfaces\",\"Role-based access control\"]}],\"licenseTiers\":[{\"name\":\"Premium\",\"contactSales\":true,\"features\":[\"Updates incl. AI model upgrades\",\"Daily backup (up to 500 GB)\",\"Proactive monitoring\",\"Premium support with short response times\"]}],\"suitableFor\":{\"prefix\":\"Suitable for up to \",\"highlight\":\"50 concurrent\",\"suffix\":\" user requests or running apps\"}}},\"appDevelopment\":{\"sectionTitle\":\"AI Apps\",\"sectionSubtitle\":\"Build yourself or let us develop\",\"sectionDescription\":\"AI Station is open to your processes. You have two ways—both lead to the same platform.\",\"paths\":[{\"eyebrow\":\"You yourself\",\"title\":\"Build automations yourself\",\"badge\":\"AI-assisted chat\",\"description\":\"Create your own AI apps via the built-in chat—no programming skills required. Connect data sources, define workflows, and test directly on your local platform.\",\"highlights\":[\"AI-assisted app creation via chat\",\"Connect your own interfaces and data sources\",\"Ideal for si lyze your tasks and build targeted AI apps that handle your specific routine work.\",\"image\":\"/products/use-cases/productivity-paradox.png\",\"imagePlaceholder\":\"Graphic: specialist vs. routine tasks (AI-generated)\"},{\"title\":\"Process \u0026 Deadline Monitoring\",\"tagline\":\"Never chase missing documents again.\",\"problem\":\"Real processes stall because external inputs are missing (e.g. receipts from clients, plans from subcontractors, tenant self-disclosures). Follow-ups consume enormous time.\",\"solution\":\"An AI app automatically checks the status of customer or employee cases via various interfaces (e.g. email, CRM, ERP, …) against defined checklists. If documents are missing, the system generates and sends polite, personalized reminders. Your back office is massively relieved.\",\"image\":\"/products/use-cases/process-watchdog.png\",\"imagePlaceholder\":\"Graphic: process monitoring \u0026 reminders (AI-generated)\"},{\"title\":\"24/7 Support\",\"tagline\":\"Instant answers to standard questions.\",\"problem\":\"Your phone rings constantly or your inbox overflows with the same organizational questions from customers, partners, or patients.\",\"solution\":\"A local AI app answers technical and organizational routine questions around the clock. \\\"What format must I use for the application?\\\", \\\"Where is the upload portal?\\\", or \\\"What documents should I bring to the first meeting?\\\" Your strategic and expert advice remains with your team.\",\"image\":\"/products/use-cases/first-level-support.png\",\"imagePlaceholder\":\"Graphic: chat support \u0026 self-service (AI-generated)\"}]},\"reservation\":{\"sectionTitle\":\"Reserve now\",\"sectionSubtitle\":\"Secure your AI Station for planned delivery from Q3 2026. Non-binding reservation—we will follow up with next steps.\",\"ctaLabel\":\"Reserve now\",\"deliveryNote\":\"Planned delivery Q3 2026\",\"formUrl\":\"https://forms.gle/UxoRBBrUt8fEBsrn9\",\"formUrlMissing\":\"Reservation form coming
